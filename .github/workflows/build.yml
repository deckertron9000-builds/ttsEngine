name: Build and Sign APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Build unsigned release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        env:
          SIGNING_KEYSTORE_B64: ${{ secrets.SIGNING_KEYSTORE_B64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          APK_NAME: ${{ vars.APK_NAME }}
        run: |
          echo "$SIGNING_KEYSTORE_B64" | base64 --decode > /tmp/release.jks

          APKSIGNER=$(find "$ANDROID_HOME/build-tools" -name "apksigner" | sort -V | tail -1)

          APK=app/build/outputs/apk/release/app-release-unsigned.apk

          "$APKSIGNER" sign \
            --ks /tmp/release.jks \
            --ks-pass "pass:$SIGNING_STORE_PASSWORD" \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --key-pass "pass:$SIGNING_KEY_PASSWORD" \
            "$APK"

          rm /tmp/release.jks

          mv "$APK" "$APK_NAME"

      - name: Get version info for release tag
        id: version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          DATE=$(date -u '+%Y%m%d')
          echo "tag=build-${DATE}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "name=Build ${DATE} (${SHORT_SHA})" >> $GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body: "Auto-built and signed from master"
          files: ${{ vars.APK_NAME }}
          make_latest: true
